name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test with coverage
        run: |
          mkdir -p coverage
          go test ./... -race -covermode=atomic -coverprofile=coverage/coverage.out

      - name: Generate coverage summary
        id: coverage
        run: |
          total="$(go tool cover -func=coverage/coverage.out | awk '/^total:/ {print $3}')"
          echo "total=${total}" >> "$GITHUB_OUTPUT"
          {
            echo "### Test results"
            echo
            echo "- \`go test ./... -race -covermode=atomic\`: passed"
            echo "- Coverage: \`${total}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate coverage badge
        run: |
          total="${{ steps.coverage.outputs.total }}"
          value="${total%%%}"
          color="#e05d44"
          awk "BEGIN { exit !($value >= 80) }" && color="#4c1" || true
          awk "BEGIN { exit !($value >= 60 && $value < 80) }" && color="#dfb317" || true
          cat > coverage/coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="112" height="20" role="img" aria-label="coverage: ${total}">
            <title>coverage: ${total}</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="112" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="63" height="20" fill="#555"/>
              <rect x="63" width="49" height="20" fill="${color}"/>
              <rect width="112" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,sans-serif" font-size="11">
              <text x="31.5" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="31.5" y="14">coverage</text>
              <text x="86.5" y="15" fill="#010101" fill-opacity=".3">${total}</text>
              <text x="86.5" y="14">${total}</text>
            </g>
          </svg>
          EOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/coverage.out
            coverage/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 커버리지 배지 갱신
          file_pattern: coverage/coverage.svg
